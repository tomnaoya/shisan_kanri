services:
  - type: web
    name: asset-management-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATA_DIR
        value: /var/data
      - key: FRONTEND_ORIGIN
        value: https://YOUR_GITHUB_USERNAME.github.io
      - key: PYTHON_VERSION
        value: 3.11.0
    disk:
      name: asset-data
      mountPath: /var/data
      sizeGB: 1
